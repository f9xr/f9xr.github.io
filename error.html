<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0;url=/404.html">
    <title>Redirecting to 404 — F9XR Team</title>
    <link rel="canonical" href="https://f9xr.github.io/404.html">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
    <link rel="stylesheet" href="assets/css/skeleton.css">
</head>
<body style="background:#212529;color:#f8f9fa;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;">
<a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[9999] focus:px-6 focus:py-3 focus:bg-accent-blue focus:text-white focus:rounded-xl focus:font-bold focus:outline-none focus:ring-4 focus:ring-accent-blue/50 transition-all">Skip to main content</a>
    <div style="text-align:center;">
        <p style="font-size:1.2rem;margin-bottom:1rem;">Redirecting you to the error page...</p>
        <a href="/404.html" style="color:#3b82f6;text-decoration:underline;">Click here if not redirected</a>
    </div>
    <script>window.location.href = '/404.html';</script>
    <script src="assets/js/skeleton.js"></script>

<script>
// Smart Navbar: hide on scroll down, show on scroll up
let lastScrollY$ = window.scrollY;
const header$ = document.getElementById('main-header');
if (header$) {
    window.addEventListener('scroll', () => {
        const currentScrollY$ = window.scrollY;
        if (currentScrollY$ > lastScrollY$ && currentScrollY$ > 100) {
            header$.classList.add('-translate-y-full');
        } else {
            header$.classList.remove('-translate-y-full');
        }
        lastScrollY$ = currentScrollY$;
    });
}
</script>

</body>
</html>
